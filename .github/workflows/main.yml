name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix gradle wrapper jar
        run: |
          wget https://services.gradle.org/distributions/gradle-8.11.1-bin.zip
          unzip gradle-8.11.1-bin.zip
          ./gradle-8.11.1/bin/gradle wrapper
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AABrowser-driving-video
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30__tpx__
